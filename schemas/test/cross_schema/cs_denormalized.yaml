# Cross-Schema Test: Denormalized (node properties in edge table)
# City is a denormalized/virtual node — its properties live in the lives_in table.
# User, Post, Tag remain standard nodes with their own tables.

name: cs_denormalized
version: "1.0"

graph_schema:
  nodes:
    - label: User
      database: cs_test
      table: users
      node_id: user_id
      property_mappings:
        name: full_name
        age: age
        city: city_name

    - label: Post
      database: cs_test
      table: posts
      node_id: post_id
      property_mappings:
        content: content
        date: created_at

    - label: Tag
      database: cs_test
      table: tags
      node_id: tag_id
      property_mappings:
        name: tag_name

    # City is denormalized — properties embedded in lives_in edge table
    - label: City
      database: cs_test
      table: lives_in
      node_id: city_code
      property_mappings: {}
      from_node_properties:
        city_code: from_city_code
        name: from_city_name
        country: from_country
      to_node_properties:
        city_code: to_city_code
        name: to_city_name
        country: to_country

  edges:
    - type: FOLLOWS
      database: cs_test
      table: follows
      from_id: follower_id
      to_id: followed_id
      from_node: User
      to_node: User
      property_mappings:
        since: since_date

    - type: AUTHORED
      database: cs_test
      table: authored
      from_id: user_id
      to_id: post_id
      from_node: User
      to_node: Post

    - type: HAS_TAG
      database: cs_test
      table: post_tags
      from_id: post_id
      to_id: tag_id
      from_node: Post
      to_node: Tag

    # LIVES_IN: User (standard) → City (denormalized in this table)
    - type: LIVES_IN
      database: cs_test
      table: lives_in
      from_id: user_id
      to_id: to_city_code
      from_node: User
      to_node: City
