# Cross-Schema Test: FK-Edge (FK column as relationship)
# AUTHORED uses Post table itself (post_id is node, user_id is FK to User)
# Other edges remain standard edge tables.

name: cs_fk_edge
version: "1.0"

graph_schema:
  nodes:
    - label: User
      database: cs_test
      table: users
      node_id: user_id
      property_mappings:
        name: full_name
        age: age
        city: city_name

    - label: Post
      database: cs_test
      table: posts
      node_id: post_id
      property_mappings:
        content: content
        date: created_at

    - label: Tag
      database: cs_test
      table: tags
      node_id: tag_id
      property_mappings:
        name: tag_name

    - label: City
      database: cs_test
      table: cities
      node_id: city_id
      property_mappings:
        name: city_name
        country: country

  edges:
    - type: FOLLOWS
      database: cs_test
      table: follows
      from_id: follower_id
      to_id: followed_id
      from_node: User
      to_node: User
      property_mappings:
        since: since_date

    # FK-edge: Post table IS the edge table (user_id FK column)
    - type: AUTHORED
      database: cs_test
      table: posts
      from_id: user_id
      to_id: post_id
      from_node: User
      to_node: Post

    - type: HAS_TAG
      database: cs_test
      table: post_tags
      from_id: post_id
      to_id: tag_id
      from_node: Post
      to_node: Tag

    - type: LIVES_IN
      database: cs_test
      table: lives_in
      from_id: user_id
      to_id: city_id
      from_node: User
      to_node: City
