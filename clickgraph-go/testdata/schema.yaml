name: test_go
graph_schema:
  nodes:
    - label: User
      database: test_db
      table: users
      node_id: user_id
      property_mappings:
        user_id: user_id
        name: full_name
        email: email_address
        age: age
        country: country
    - label: Post
      database: test_db
      table: posts
      node_id: post_id
      property_mappings:
        post_id: post_id
        title: title
        content: body
        created_at: created_at
  edges:
    - type: FOLLOWS
      database: test_db
      table: follows
      from_node: User
      to_node: User
      from_id: follower_id
      to_id: followed_id
      property_mappings:
        follow_date: follow_date
    - type: AUTHORED
      database: test_db
      table: authored
      from_node: User
      to_node: Post
      from_id: user_id
      to_id: post_id
      property_mappings: {}
    - type: LIKED
      database: test_db
      table: liked
      from_node: User
      to_node: Post
      from_id: user_id
      to_id: post_id
      property_mappings:
        liked_at: liked_at
